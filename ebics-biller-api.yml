openapi: 3.0.3
info:
  title: EBICS Biller API
  description: |
    Biller-facing EBICS API exposed by eBillGuardian.

    ## Authentication flow
    1. Call **POST /swp/v1/billers/authenticate** with your `billerPid` and `billerSecret`.
    2. The response contains a JWT `token`. Pass it as `Authorization: Bearer <token>` on every EBICS call.
    3. The JWT encodes your granted **scopes** (`EBILL`, `EBICS`, or both) based on your account status.
       - `EBICS` scope is required to call any `/ebics/v1/v3/*` endpoint.
       - A biller with `ebicsStatus = ACTIVE` will have `EBICS` in their token scopes.
    4. You do **not** need to pass `ebicsUserId` or `billerId` — these are resolved internally from your JWT.
  version: 1.1.0

servers:
  - url: https://api.billte.ch
    description: Production

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: "Unauthorized: billerPid not present in token"

    AuthenticateRequest:
      type: object
      required: [billerPid, billerSecret]
      properties:
        billerPid:
          type: string
          example: "41140074442216296"
        billerSecret:
          type: string
          example: "s3cr3t-uuid-value"

    AuthenticateResponse:
      type: object
      properties:
        type:
          type: string
          example: "Biller"
        billerPid:
          type: string
          example: "41140074442216296"
        token:
          type: string
          description: JWT containing billerPid, scopes, and expiry
          example: "eyJhbGci..."
        expiresIn:
          type: integer
          description: Token lifetime in seconds
          example: 90000

    BTURequest:
      type: object
      description: |
        Upload a file (e.g. payment order, direct debit order) via EBICS BTU (H005).
        Use the exact `serviceName`, `scope`, `msgName`, `msgNameVersion`, and `containerType`
        values from your subscribed BTF (Business Transaction Formats) Call HTD to retrieve them.
      required: [fileName, serviceName, scope, msgName, fileContent]
      properties:
        fileName:
          type: string
          description: Logical file name for the uploaded payload. Used only for reference on bank side.
          example: "payment.xml"
        serviceName:
          type: string
          description: BTF service name (e.g. payment or collection service family)
          example: "MCT"
        scope:
          type: string
          description: BTF scope value defined by the bank for this service
          example: "CH"
        serviceOption:
          type: string
          nullable: true
          description: Optional BTF service option if required by the bank
        msgName:
          type: string
          description: Message name of the uploaded format
          example: "pain.001"
        msgNameVersion:
          type: string
          description: Message name version
          example: "03"
        msgNameVariant:
          type: string
          nullable: true
          description: Message name variant
          example: "001"
        msgNameFormat:
          type: string
          nullable: true
          description: Message format
          example: "XML"
        containerType:
          type: string
          nullable: true
          description: |
            Container type for the uploaded data. Allowed values include XML, ZIP, and SVC.
            Use null unless your subscribed format specifies a container type.
          example: "XML"
        signatureFlag:
          type: boolean
          description: |
            Set to true to use default upload method (EBICS upload Method 1) and false to use manual upload method (EBICS Method 2).
            Maps to BTU order parameter SignatureFlag (present = true).
            signatureFlag=true: EBICS upload Method 1 (default method) — order is declared for bank-technical electronic signatures (ES) inside EBICS.
            signatureFlag=false: EBICS Method 2 (manual method) – style upload; order is not routed to Electronic Distributed Signature (EDS) per specification;
            business approval is outside the normal ES/EDS workflow (bank-specific).
            Note: Which ES classes are attached (e.g. A, B, E, T) is configured separately on bank side.
          example: true
        signatureFlagEds:
          type: boolean
          description: |
            Set to false for fully signed orders, true for partially signed orders.
            This flag controls whether the bank forwards the order to EDS (Electronic Distributed Signature).
            Use only when signatureFlag is true; ignored otherwise.
            signatureFlagEds=true: Order is forwarded to EDS (case for partially signed orders)
            a) if the submitted ES are not yet sufficient, the bank may place the order in EDS so further signers can add ES via order type HVE;
            b) if ES are already sufficient, forwarding to EDS has no further effect.
            signatureFlagEds=false: Order is not forwarded to EDS (normal case for fully signed orders).
            In case of insufficient ES this normally leads to rejection instead of EDS.
          example: false
        fileContent:
          type: string
          format: byte
          description: |
            File payload, this field is Base64-encoded (standard Jackson binding for byte[]).
            The decoded bytes must match the message type implied by the BTF parameters above (msgName, msgNameVersion, msgNameVariant, msgNameFormat, containerType).
            For example, when msgName is "pain.001", msgNameVersion is "09", and msgNameVariant is "001", the payload must be the Base64 encoding of an XML document
            that validates against the official ISO 20022 schema pain.001.001.09.xsd (Customer Credit Transfer Initiation).
            Choose msg/container settings and bytes consistently so the bank receives the format it expects for that order.

    BTUResponse:
      type: object
      properties:
        ebicsUserId:
          type: string
          description: EBICS user identifier used for the request
          example: "ZKB03305"
        status:
          type: string
          description: High-level processing status of the BTU operation
          example: "SUCCESS"
        message:
          type: string
          description: Human-readable message describing the BTU processing result
          nullable: true
        transactionId:
          type: string
          nullable: true
          description: EBICS transaction identifier returned by the bank
        orderId:
          type: string
          nullable: true
          description: EBICS order identifier associated with the BTU request (pattern like one letter followed by three alphanumeric characters)
        receiptCode:
          type: string
          nullable: true
          description: Bank receipt code confirming upload handling (currently always null)

    BTDRequest:
      type: object
      description: |
        Download a file (e.g. statement, report, etc.) via EBICS BTD (H005).
        Use the exact service parameters from your subscribed BTF (Business Transaction Formats) Call HTD to retrieve them.
      required: [serviceName, scope, msgName]
      properties:
        serviceName:
          type: string
          description: BTF service name (e.g. account reporting service family)
          example: "EOP"
        scope:
          type: string
          description: BTF scope value defined by the bank for this service
          example: "CH"
        serviceOption:
          type: string
          nullable: true
          description: Optional BTF service option if required by the bank
        containerType:
          type: string
          nullable: true
          description: Container type expected for returned data. Allowed values include XML, ZIP, and SVC.
          example: "ZIP"
        msgName:
          type: string
          description: Message name of the requested format
          example: "camt.053"
        msgNameVersion:
          type: string
          description: Message version
          example: "04"
        msgNameVariant:
          type: string
          nullable: true
          description: Message variant
        msgNameFormat:
          type: string
          nullable: true
          description: Message format
        startDate:
          type: string
          format: date
          description: Optional start date (inclusive) for historical data retrieval in yyyy-MM-dd format
          example: "2026-01-01"
        endDate:
          type: string
          format: date
          description: Optional end date (inclusive) for historical data retrieval in yyyy-MM-dd format
          example: "2026-04-19"

    BTDResponse:
      type: object
      properties:
        ebicsUserId:
          type: string
          description: EBICS user identifier used for the request
          example: "ZKB03305"
        status:
          type: string
          description: High-level processing status of the BTD operation
          example: "SUCCESS"
        message:
          type: string
          description: Human-readable message describing the BTD processing result
          nullable: true
        cloudUrl:
          type: string
          nullable: true
          description: Public signed cloud storage URL for accessing the downloaded file. For security reasons, don't share this URL with anyone. This URL expires after 24 hours.
        partialFilePath:
          type: string
          nullable: true
          description: Relative path within the cloud storage bucket for the downloaded file
        transactionId:
          type: string
          nullable: true
          description: EBICS transaction identifier returned by the bank (currently always null)
        orderId:
          type: string
          nullable: true
          description: EBICS order identifier associated with the BTD request (pattern like one letter followed by three alphanumeric characters)
        dataAvailabilityStatus:
          type: string
          nullable: true
          description: Data availability status derived from EBICS return codes (e.g. AVAILABLE, NO_DATA, ERROR)
        headerReturnCode:
          type: string
          nullable: true
          description: Header-level EBICS return code
        headerReturnText:
          type: string
          nullable: true
          description: Header-level EBICS return text
        bodyReturnCode:
          type: string
          nullable: true
          description: Body-level EBICS return code
        bodyReturnText:
          type: string
          nullable: true
          description: Body-level EBICS return text
        bodyReturnSymbolicName:
          type: string
          nullable: true
          description: Symbolic name for the body-level EBICS return code

    HTDRequest:
      type: object
      description: Retrieve the list of subscribed EBICS BTF formats for this biller (H005 HTD v3).
      properties: {}

    HTDResponse:
      type: object
      properties:
        ebicsUserId:
          type: string
          example: "ZKB03305"
        businessTransactionFormats:
          type: array
          description: List of subscribed BTF format combinations. Use these exact values in BTU/BTD requests.
          items:
            type: object
            properties:
              serviceName:
                type: string
                example: "MCT"
              scope:
                type: string
                example: "CH"
              serviceOption:
                type: string
                nullable: true
              containerType:
                type: string
                nullable: true
              msgName:
                type: string
                example: "pain.001"
              msgNameVersion:
                type: string
                nullable: true
                example: "03"
              msgNameVariant:
                type: string
                nullable: true
              msgNameFormat:
                type: string
                nullable: true

paths:
  # ════════════════════════════════════════════
  # AUTHENTICATION (no JWT required)
  # ════════════════════════════════════════════
  /swp/v1/billers/authenticate:
    post:
      summary: Authenticate – obtain JWT
      description: |
        Exchange `billerPid` + `billerSecret` for a JWT.

        The returned token contains `scopes` derived from your account status:
        - `EBILL` — if your biller is in `EbillOnboarded` status
        - `EBICS` — if your biller has `ebicsStatus = ACTIVE`

        The `EBICS` scope is required to call any `/ebics/v1/v3/*` endpoint.
      operationId: authenticateBiller
      tags: [Authentication]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthenticateRequest'
            example:
              billerPid: "41140074442216296"
              billerSecret: "s3cr3t-uuid-value"
      responses:
        '200':
          description: JWT issued successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticateResponse'
        '401':
          description: Invalid credentials or biller not authorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ════════════════════════════════════════════
  # HEALTH
  # ════════════════════════════════════════════
  /client/ebics/healthcheck:
    get:
      summary: Health check
      operationId: healthCheck
      tags: [Health]
      security: []
      responses:
        '200':
          description: Service is healthy

  # ════════════════════════════════════════════
  # EBICS v3 (H005) — requires EBICS scope
  # ════════════════════════════════════════════
  /client/ebics/v3/htd:
    post:
      summary: HTD – List subscribed BTF formats 
      description: |
        Returns the list of EBICS BTF (Business Transaction Formats) subscribed for this biller at the bank.
        Use the returned `serviceName`, `scope`, `msgName`, `msgNameVersion`, and `containerType`
        values directly in BTU/BTD requests.
      operationId: v3Htd
      tags: [EBICS v3]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HTDRequest'
            example: {}
      responses:
        '200':
          description: List of subscribed BTF (Business Transaction Formats) 
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTDResponse'
              examples:
                htdListingBTFsAndAccounts:
                  summary: HTD response example listing allowed BTFs and accounts
                  value:
                    ebicsUserId: "ZKB03305"
                    businessTransactionFormats:
                      - serviceName: "MCT"
                        scope: "CH"
                        serviceOption: null
                        containerType: null
                        msgName: "pain.001"
                        msgNameVersion: "09"
                        msgNameVariant: null
                        msgNameFormat: null
                      - serviceName: "MCT"
                        scope: "CH"
                        serviceOption: null
                        containerType: null
                        msgName: "pain.001"
                        msgNameVersion: "03"
                        msgNameVariant: null
                        msgNameFormat: null
                      - serviceName: "PSR"
                        scope: "CH"
                        serviceOption: null
                        containerType: "ZIP"
                        msgName: "pain.002"
                        msgNameVersion: "03"
                        msgNameVariant: null
                        msgNameFormat: null
                      - serviceName: "PSR"
                        scope: "CH"
                        serviceOption: null
                        containerType: "ZIP"
                        msgName: "pain.002"
                        msgNameVersion: "10"
                        msgNameVariant: null
                        msgNameFormat: null
                      - serviceName: "EOP"
                        scope: "CH"
                        serviceOption: null
                        containerType: "ZIP"
                        msgName: "camt.053"
                        msgNameVersion: "04"
                        msgNameVariant: null
                        msgNameFormat: null
                      - serviceName: "EOP"
                        scope: "CH"
                        serviceOption: null
                        containerType: "ZIP"
                        msgName: "camt.053"
                        msgNameVersion: "08"
                        msgNameVariant: null
                        msgNameFormat: null
                      - serviceName: "REP"
                        scope: "CH"
                        serviceOption: null
                        containerType: "ZIP"
                        msgName: "camt.054"
                        msgNameVersion: "04"
                        msgNameVariant: null
                        msgNameFormat: null
                      - serviceName: "REP"
                        scope: "CH"
                        serviceOption: null
                        containerType: "ZIP"
                        msgName: "camt.054"
                        msgNameVersion: "08"
                        msgNameVariant: null
                        msgNameFormat: null
                    message: null
                    status: null
                    accounts:
                      - id: "12345"
                        currency: "CHF"
                        description: null
                        accountHolder: "Mustermann AG"
                        structuredAccountNumbers:
                          - value: "CH3900700115651849173"
                            international: true
                          - value: "651849173"
                            international: false
                        nationalAccountNumbers: []
                        structuredBankCodes:
                          - value: "RAIFCH22XXX"
                            international: true
                            prefix: null
                        nationalBankCodes:
                          - value: "81356"
                            format: "other"
        '401':
          description: Unauthorized or missing EBICS scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /client/ebics/v3/btu:
    post:
      summary: BTU – Upload file
      description: |
        Upload a file (e.g. payment order, direct debit order) to the bank via EBICS H005 BTU.

        Call **HTD** first to retrieve the exact BTF (Business Transaction Format) parameters subscribed for your account.
        The `serviceName`, `scope`, `msgName`, `msgNameVersion`, and `containerType` values must match
        your subscribed configuration exactly.
      operationId: v3Btu
      tags: [EBICS v3]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BTURequest'
            examples:
              pain001SwissPaymentOrder:
                summary: Swiss payment order upload (pain.001.001.09)
                description: Example BTU request for a Swiss payment order.
                value:
                  fileName: "pain.001.001.09.xml"
                  serviceName: "MCT"
                  scope: "CH"
                  msgName: "pain.001"
                  msgNameVersion: "09"
                  signatureFlag: true
                  signatureFlagEds: true
                  fileContent: ""
              pain008SepaDirectDebitOrder:
                summary: SEPA direct debit order upload (pain.008.001.08)
                description: Example BTU request for a SEPA direct debit order.
                value:
                  fileName: "pain.008.001.08.xml"
                  serviceName: "SDD"
                  scope: "CH"
                  msgName: "pain.008"
                  signatureFlag: true
                  signatureFlagEds: true
                  fileContent: ""
      responses:
        '200':
          description: File uploaded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BTUResponse'
              examples:
                successfulBtuUpload:
                  summary: Successful BTU file upload
                  description: Example response when the BTU file upload completes successfully.
                  value:
                    ebicsUserId: "ZKB03305"
                    status: "SUCCESS"
                    message: "BTU upload completed successfully"
                    transactionId: "fe4eabb517d3455d165a532fea059d0c"
                    orderId: "AAAX"
                    receiptCode: null
        '401':
          description: Unauthorized or missing EBICS scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: |
            Internal server error. If `EBICS_INVALID_ORDER_IDENTIFIER` is returned, the user must
            first call the HTD/HAA operation to retrieve a valid list of supported BTF formats for
            the BTU parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BTUResponse'
              examples:
                ebicsInvalidOrderIdentifier:
                  summary: BTU execution error
                  description: |
                    Example when the bank rejects the BTF (e.g. unknown or disallowed BTF format). The
                    error text includes `[EBICS_INVALID_ORDER_IDENTIFIER]`. Use BTF parameters from HTD/HAA. 
                  value:
                    ebicsUserId: "ZKB03305"
                    status: "ERROR"
                    message: "Failed to execute BTU: Error in executing BTU :: ZKB03305 :: Error during BTU execution for H005: ZKB03305 :: [EBICS_INVALID_ORDER_IDENTIFIER] Auftragsart unzulässig"
                    transactionId: null
                    orderId: null
                    receiptCode: null

  /client/ebics/v3/btd:
    post:
      summary: BTD – Download file
      description: |
        Download a file (e.g. statement, report, etc.) from the bank via EBICS H005 BTD.

        Call **HTD** first to retrieve the exact BTF (Business Transaction Format) parameters subscribed for your account.

        **Common BTF parameters in European Banks:**
        | serviceName | msgName | msgNameVersion | containerType | description |
        |---|---|---|---|---|
        | EOP | camt.053 | 04 or 08 | ZIP | End of day statements |
        | STM | camt.052 | 04 or 08 | ZIP | Intraday statements |
        | REP | camt.054 | 04 or 08 | ZIP | Credit/Debit notifications |
        | PSR | pain.002 | 03 or 10 | ZIP | Payment status reports |
      operationId: v3Btd
      tags: [EBICS v3]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BTDRequest'
            examples:
              camt053StatementActual:
                summary: Daily account statement request (Actual)
                description: Camt053 v08 statement (actual download of not-yet downloaded files from bank).
                value:
                  serviceName: "EOP"
                  scope: "CH"
                  msgName: "camt.053"
                  msgNameVersion: "08"
                  containerType: "ZIP"
              camt053StatementHistorical:
                summary: Daily account statement request (Historical)
                description: Camt053 v08 statement (historical download for given date range).
                value:
                  serviceName: "EOP"
                  scope: "CH"
                  msgName: "camt.053"
                  msgNameVersion: "08"
                  containerType: "ZIP"
                  startDate: "2026-04-01"
                  endDate: "2026-04-20"
              camt052IntradayReportActual:
                summary: Intraday account report request (Actual)
                description: Camt052 v08 statement (actual download of not-yet downloaded files from bank).
                value:
                  serviceName: "STM"
                  scope: "CH"
                  msgName: "camt.052"
                  msgNameVersion: "08"
                  containerType: "ZIP"
              camt052IntradayReportHistorical:
                summary: Intraday account report request (Historical)
                description: Camt052 v08 statement (historical download for given date range).
                value:
                  serviceName: "STM"
                  scope: "CH"
                  msgName: "camt.052"
                  msgNameVersion: "08"
                  containerType: "ZIP"
                  startDate: "2026-04-20"
                  endDate: "2026-04-20"
      responses:
        '200':
          description: File downloaded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BTDResponse'
              examples:
                successfulBtdDownloadDataAvailable:
                  summary: Successful BTD download - data available
                  description: Example response when BTD completes successfully and file data is available (signed cloud URL).
                  value:
                    ebicsUserId: "ZKB03305"
                    status: "SUCCESS"
                    message: "BTD download completed successfully"
                    cloudUrl: "https://storage.googleapis.com/billte-ebics-client-file-uploads/ebicsDocs/BTD/BTD_2026-05-01T19%3A38%3A28.336061Z_ZKB03305.zip?X-Goog-Algorithm=GOOG4-RSA-SHA256&X-Goog-Credential=billte-ebics-storage%40billte-ebics-client.iam.gserviceaccount.com%2F20260501%2Fauto%2Fstorage%2Fgoog4_request&X-Goog-Date=20260501T193829Z&X-Goog-Expires=86400&X-Goog-SignedHeaders=host&X-Goog-Signature=5e2da1915627ed0e4ff5936220c12a1f4e241e96681431f449521b8da9d3c6f33288ed1ebb3bf0561c73d77e8a6e167e5822b743b3de098037d9c6b03d751e6316b1a15fbe"
                    partialFilePath: "ebicsDocs/BTD/BTD_2026-05-01T19:38:28.336061Z_ZKB03305.zip"
                    transactionId: null
                    orderId: null
                    dataAvailabilityStatus: "AVAILABLE"
                    headerReturnCode: "000000"
                    headerReturnText: "[EBICS_OK] OK"
                    bodyReturnCode: "000000"
                    bodyReturnText: "000000"
                    bodyReturnSymbolicName: "EBICS_OK"
                unsuccessfulBtdDownloadNoData:
                  summary: Unsuccessful BTD download - data not available
                  description: Example 200 response when the operation succeeds but no download data exists for the requested date range.
                  value:
                    ebicsUserId: "ZKB03305"
                    status: "SUCCESS"
                    message: "No data available for the requested date range"
                    cloudUrl: null
                    partialFilePath: null
                    transactionId: null
                    orderId: null
                    dataAvailabilityStatus: "NO_DATA"
                    headerReturnCode: null
                    headerReturnText: null
                    bodyReturnCode: "090005"
                    bodyReturnText: "No download data available"
                    bodyReturnSymbolicName: "EBICS_NO_DOWNLOAD_DATA_AVAILABLE"
        '401':
          description: Unauthorized or missing EBICS scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: |
            Internal server error. If `EBICS_INVALID_ORDER_IDENTIFIER` is returned, the user must
            first call the HTD/HAA operation to retrieve a valid list of supported BTF formats for
            the BTD parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BTDResponse'
              examples:
                ebicsInvalidOrderIdentifier:
                  summary: BTD execution error
                  description: |
                    Example when the bank rejects the BTF (e.g. unknown or disallowed BTF format). The
                    error text includes `[EBICS_INVALID_ORDER_IDENTIFIER]`. User BTF parameters from HTD/HAA.
                  value:
                    ebicsUserId: "ZKB03305"
                    status: "ERROR"
                    message: "Failed to execute BTD: Error in executing BTD :: ZKB03305 :: Error during BTD execution: [EBICS_INVALID_ORDER_IDENTIFIER] Auftragsart unzulässig"
                    fileName: null
                    filePath: null
                    cloudUrl: null
                    partialFilePath: null
                    transactionId: null
                    orderId: null
                    dataAvailabilityStatus: null
                    headerReturnCode: null
                    headerReturnText: null
                    bodyReturnCode: null
                    bodyReturnText: null
                    bodyReturnSymbolicName: null

tags:
  - name: Authentication
    description: Obtain a JWT before calling any EBICS endpoint
  - name: Health
    description: Service health
  - name: EBICS v3
    description: EBICS H005 operations (require EBICS scope in JWT)
